databases:
  - name: canil-db
    plan: starter
    mysqlVersion: '8.0'

services:
  - type: web
    name: projeto-canil
    runtime: node
    plan: starter
    buildCommand: npm install && npm run build
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: '3000'
      - key: DATABASE_URL
        fromDatabase:
          name: canil-db
          property: connectionString
